      description: "מתמטיקה אונטולוגית בעברית"
  en:
    label: "English"
    locale: "en"
    direction: ltr
    contentDir: content/en       # תוכן אנגלי עתידי ב-content/en/
    weight: 2
    title: "Illuminism"
    menu:
      main:
        - name: "Tags"
          url: /en/tags/
          weight: 30
    params:
      description: "Ontological mathematics — AI-translated edition"
      # שם המחבר באנגלית (חל על כל הפוסטים האנגליים — אחרת מוצג "ערן אבן־חיים")
      author: "Eran Even-Haim"
      # ─── בייליין אנגלי (override; אחרת ה-header מציג את הטקסט העברי גם ב-/en/) ───
      subtitle: "Eran Even-Haim · Philosophy · Mathematics · Science · Consciousness"
      masthead:
        title: "Illuminism"
        subtitle: "Eran Even-Haim · Philosophy · Mathematics · Science · Consciousness"
      # ─── תרגום ווידג'טי הסרגל לאנגלית (override של ה-params הגלובליים העבריים) ───
      sidebarAbout:
        title: "About"
        text: "Rational philosophy on the great questions of existence. What is matter? What is consciousness? What is time? Why can reality be put into mathematical form?…"
        moreText: "Read more →"
      sidebarQuote:
        latin: "Sapere aude"
        text: "Dare to know"
        author: "– Immanuel Kant"
      sidebarQuotes:
        - text: "A thought, even a possibility, can shatter and transform us."
          author: "– Friedrich Nietzsche"
        - text: "What I understand by a 'philosopher': a terrible explosive in whose presence everything is in danger."
          author: "– Nietzsche"
        - text: "I find in these thoughts so many things which alarm me, and which almost all men, if I am not mistaken, will find so shocking, that I do not see of what use a writing can be, which apparently all the world will reject."
          author: "– Antoine Arnauld (responding to Leibniz, 1686)"
        - text: "Mathematics is, astonishingly, the language of nature itself."
          author: "– Paul Davies"
        - text: "Mathematics is the territory, not the map. Or: mathematics is the territory and the map alike."
          author: "– Eran Even-Haim"
        - text: "All truths are easy to understand once they are discovered; the point is to discover them."
          author: "– Galileo"
        - text: "An expert is a person who avoids the small errors as he sweeps on to the grand fallacy."
          author: "– Weinberg's Corollary (Arthur Bloch)"
        - text: "Physical laws should have mathematical beauty."
          author: "– Paul Dirac"
        - text: "Mathematics, rightly viewed, possesses not only truth, but supreme beauty – a beauty cold and austere, like that of sculpture."
          author: "– Bertrand Russell"
        - text: "The correspondence between mathematics and the physical world is so precise, so unexpected, and yet so productive that it can feel almost magical."
          author: "– Prof. Frank Wilczek"
        - text: "It's actually unreasonable how well mathematics works. Why should the world behave according to mathematical laws?"
          author: "– Prof. Anton Zeilinger"
        - text: "It's not only that it becomes easier to describe with mathematics, as you go deeper and deeper into reality; mathematics becomes the only way to describe reality."
          author: "– Prof. Leonard Susskind"
        - text: "I teach you the overman. Man is something that shall be overcome… It is now the great noon, when man stands midway on his path between beast and overman."
          author: "– Nietzsche"
        - text: "Reason can never be popular. Passions and feelings may become popular, but reason will always remain the property of the few."
          author: "– Goethe"
        - text: "To one who looks at the world rationally, the world in turn presents a rational face; the relation is mutual."
          author: "– Hegel"
      channelsTitle: "Social media"
      channels:
        - name: "YouTube (soon)"
          url: "#"
        - name: "Instagram (soon)"
          url: "#"
        - name: "Facebook"
          url: "#"
      navTitle: "Read in order"

markup:
  goldmark:
    renderer:
      # מאפשר HTML גולמי בתוך Markdown (למשל <u>קו תחתון</u>).
      # בטוח כאן כי ערן הוא הכותב היחיד של התוכן.
      unsafe: true
