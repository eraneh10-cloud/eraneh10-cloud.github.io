baseURL: "https://illuminism.net/"
title: "Illuminism | אילומיניזם"
theme: "PaperMod"

# ─── רב-לשוני: עברית (ברירת מחדל, /) + אנגלית (/en/) ───
defaultContentLanguage: he
defaultContentLanguageInSubdir: false

languages:
  he:
    languageName: "עברית"
    languageCode: "he"
    languagedirection: rtl
    contentDir: content          # תוכן עברי נשאר ב-content/ (ללא שינוי)
    weight: 1
    title: "אילומיניזם"
    params:
      description: "מתמטיקה אונטולוגית בעברית"
  en:
    languageName: "English"
    languageCode: "en"
    languagedirection: ltr
    contentDir: content/en       # תוכן אנגלי עתידי ב-content/en/
    weight: 2
    title: "Illuminism"
    params:
      description: "Ontological mathematics — AI-translated edition"

markup:
  goldmark:
    renderer:
      # מאפשר HTML גולמי בתוך Markdown (למשל <u>קו תחתון</u>).
      # בטוח כאן כי ערן הוא הכותב היחיד של התוכן.
      unsafe: true
params:
  defaultTheme: dark
  displayFullLangName: true   # מתג השפה מציג "עברית"/"English" במקום קוד
  images: ["images/cover.png"]
  description: "מתמטיקה אונטולוגית בעברית — פילוסופיה, מדע ותודעה"
  ShowReadingTime: true
  ShowToc: true
  ShowPostNavLinks: true
  mainSections:
    - posts

  # ─────────────────────────────────────────────────────────
  #  כל הטקסטים הניתנים לעריכה במקום אחד.
  #  שינוי כאן משנה את האתר — אין צורך לגעת בתבניות.
  # ─────────────────────────────────────────────────────────

  # שם המחבר (משמש במסטהד ובמטא־דאטה)
  author: "ערן אבן־חיים"

  # תת-כותרת ההדר (ליד הלוגו למעלה)
  subtitle: "ערן אבן חיים | פילוסופיה · מתמטיקה ומדע · תודעה"

  # מסטהד עמוד הבית
  masthead:
    title: "Illuminism · אילומיניזם"
    subtitle: "ערן אבן־חיים · פילוסופיה · מתמטיקה ומדע · תודעה"

  # סרגל הווידג'טים — תיבת אודות
  sidebarAbout:
    title: "אודות"
    text: "עמוד פילוסופיה רציונלית בעברית. מהו חומר? מהי תודעה? מהו זמן? למה המציאות ניתנת לניסוח מתמטי?…"
    moreText: "קרא עוד ←"

  # סרגל הווידג'טים — תיבת ציטוט (הציטוט הראשון/העוגן)
  sidebarQuote:
    latin: "Sapere aude"      # נכתב משמאל-לימין
    text: "העזו לדעת"
    author: "— עמנואל קאנט"

  # ציטוטים נוספים — גוללים כפרומפטר יחד עם הציטוט למעלה, אותו עיצוב תיבה.
  # להוספת ציטוט: עוד פריט text/author. מקף קצר (–) בגוף העברי בלבד.
  sidebarQuotes:
    - text: "מחשבה, ואפילו אפשרות בלבד, עשויה לרסק אותנו ולשנות אותנו."
      author: "– פרידריך ניטשה"
    - text: "מה שאני מבין ב'פילוסוף': חומר נפץ נורא, שבנוכחותו הכל בסכנה."
      author: "– ניטשה"
    - text: "מצאתי במחשבות אלו דברים רבים המבהילים אותי, ושכמעט כל בני האדם, אם אינני טועה, ימצאו מזעזעים – עד שאינני רואה לאיזה תועלת יכול לשמש כתב שכנראה כל העולם ידחה."
      author: "– ארנו, ינסניסט קתולי, בתגובה למכתב מלייבניץ"
    - text: "מתמטיקה היא שפה – שפת הטבע."
      author: "– פול דייויס"
    - text: "המתמטיקה היא הטריטוריה, לא המפה. או: המתמטיקה היא הטריטוריה והמפה גם יחד."
      author: "– ערן אבן חיים"
    - text: "כל האמיתות קלות להבנה ברגע שמגלים אותן; הנקודה היא לגלות אותן."
      author: "– גלילאו"
    - text: "מומחה הוא מי שמצליח להימנע מהטעויות הקטנות בדרכו אל הכשל הגדול."
      author: "– קורולריית ויינברג (ארתור בלוך)"
    - text: "לחוקי הפיזיקה צריך להיות יופי מתמטי."
      author: "– פול דיראק"
    - text: "יהיה אשר יהיה האמת על היקום – היא בוודאי תהיה מדהימה."
      author: "– ברטראנד ראסל"
    - text: "הקשר בין מתמטיקה למציאות הוא נס – אבל הוא עובד."
      author: "– פרופ' פרנק וילצ'ק"
    - text: "זה בלתי סביר ממש עד כמה המתמטיקה עובדת. למה העולם אמור להתנהג לפי חוקים מתמטיים?"
      author: "– פרופ' אנטון צילינגר"
    - text: "זה לא רק שקל יותר לתאר באמצעות מתמטיקה ככל שחודרים עמוק יותר אל המציאות – המתמטיקה הופכת לדרך היחידה לתאר את המציאות."
      author: "– פרופ' לאונרד סוסקינד"
    - text: "אני מלמד אתכם את העל-אדם. האדם הוא משהו שיש לעלות עליו... עתה הוא הצהריים הגדולים, שבהם האדם עומד באמצע דרכו בין חיה לעל-אדם."
      author: "– ניטשה"
    - text: "התבונה לעולם לא תוכל להיות פופולרית. תשוקות ורגשות עשויים להיות פופוליים, אבל התבונה תישאר לעולם נחלתם של מעטים."
      author: "– גתה"
    - text: "למי שמתבונן על העולם באורח שכלתני – העולם מציג בתורו פנים שכלתניות. היחס הוא הדדי."
      author: "– הגל"

